<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C3BOT 安全跳轉中</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f4f7f6; }
    #loading-screen { text-align: center; }
    .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #2ecc71; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .btn { margin-top: 20px; padding: 10px 20px; background: #2ecc71; color: white; border: none; border-radius: 5px; cursor: pointer; display: none; }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div id="status-icon" class="spinner"></div>
    <div id="status-text" style="margin-top:20px; color:#95a5a6;">安全驗證中...</div>
    <button id="close-btn" class="btn" onclick="liff.closeWindow()">點我手動關閉</button>
  </div>

  <script>
    const LIFF_ID = "2009886169-TXLoH2ov";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyA5ZQi5wMX--qzOtSM0DczPz2t5ckkVz4rQjTwPXoi1hzsvnqr-IHi5VzZsHDOhbP8NQ/exec";

    window.onload = function() {
      const params = new URLSearchParams(window.location.search);
      const isClosing = params.get('action') === 'close';

      if (isClosing) {
        document.getElementById('status-text').innerText = "操作成功！即將關閉視窗...";
        document.getElementById('close-btn').style.display = "inline-block";
      }

      liff.init({ liffId: LIFF_ID }).then(() => {
        if (isClosing) {
          liff.closeWindow();
          return;
        }

        if (!liff.isLoggedIn()) {
          liff.login();
        } else {
          liff.getProfile().then(profile => {
            const redirectUrl = GAS_URL + "?userId=" + profile.userId + "&userName=" + encodeURIComponent(profile.displayName);
            window.location.href = redirectUrl;
          });
        }
      }).catch(err => {
        console.error(err);
        document.getElementById('status-text').innerText = "驗證失敗，請嘗試手動關閉。";
      });
    };
  </script>
</body>
</html>
