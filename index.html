<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>C3BOT 系統跳轉中</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f4f7f6; }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #2ecc71; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    p { margin-top: 20px; color: #666; }
  </style>
</head>
<body>
  <div class="loader"></div>
  <p id="msg">正在透過 LINE 安全驗證中...</p>

  <script>
    const LIFF_ID = "2009886169-TXLoH2ov";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyA5ZQi5wMX--qzOtSM0DczPz2t5ckkVz4rQjTwPXoi1hzsvnqr-IHi5VzZsHDOhbP8NQ/exec";

    window.onload = function() {
      liff.init({ liffId: LIFF_ID }).then(() => {
        // 新增：如果是從 GAS 跳回來要關閉視窗的
        const params = new URLSearchParams(window.location.search);
        if (params.get('action') === 'close') {
          liff.closeWindow();
          return;
        }

        if (!liff.isLoggedIn()) {
          liff.login();
        } else {
          // 取得用戶 Profile 以確保身分
          liff.getProfile().then(profile => {
            document.getElementById('msg').innerText = "驗證成功，正在進入系統...";
            // 帶入 userId 進行跳轉 (這是最穩定的方式)
            const redirectUrl = GAS_URL + "?userId=" + profile.userId + "&userName=" + encodeURIComponent(profile.displayName);
            window.location.href = redirectUrl;
          });
        }
      }).catch(err => {
        document.getElementById('msg').innerText = "連線異常: " + err.message;
      });
    };
  </script>
</body>
</html>
